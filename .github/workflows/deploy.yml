name: Deploy to VPS

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-net
          file: ./backend-net/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push AI Engine image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-engine-python
          file: ./ai-engine-python/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ai-engine:latest
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_PAT: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          envs: GHCR_PAT
          script: |
            set -e
            
            # Login to GitHub Container Registry using the ephemeral token
            echo $GHCR_PAT | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Navigate to the deployment directory (create it if it doesn't exist)
            DEPLOY_DIR="/home/${{ secrets.VPS_USER }}/server/smart-logix-rag"
            mkdir -p $DEPLOY_DIR
            cd $DEPLOY_DIR
            
            # Initialize git repository if it doesn't exist, otherwise pull latest changes
            if [ ! -d .git ]; then
              git clone git@github.com:${{ github.repository }}.git . || git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin
              git checkout main
              git pull origin main
            fi
            
            # Setup environment variables if .env doesn't exist (copy from example)
            if [ ! -f .env ] && [ -f .env.example ]; then
              cp .env.example .env
            fi
            
            # Pull the latest built images from GHCR
            docker compose pull
            
            # Restart containers with the newly pulled images
            docker compose down --remove-orphans || true
            docker compose up -d
            
            # Clean up old images to free up disk space on the VPS
            docker image prune -af

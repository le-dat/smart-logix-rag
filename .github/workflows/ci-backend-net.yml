name: Backend .NET CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'backend-net/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'backend-net/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend-net

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore SmartLogix.WebApi.csproj

      - name: Build
        run: dotnet build SmartLogix.WebApi.csproj --configuration Release --no-restore

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: backend-net-build
          path: backend-net/SmartLogix.WebApi/
          retention-days: 7
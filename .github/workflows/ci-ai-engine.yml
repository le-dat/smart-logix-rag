name: AI Engine Python CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'ai-engine-python/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'ai-engine-python/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ai-engine-python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ai-engine-python/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .

      - name: Type check with mypy
        run: |
          pip install mypy types-requests
          mypy main.py --ignore-missing-imports

      - name: Build Docker image
        run: docker build -t ai-engine:test -f Dockerfile .
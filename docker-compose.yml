version: '3.8'

services:
  db-mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: db-mssql
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:-SmartLogix@SecurePassword2026}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD:-SmartLogix@SecurePassword2026}", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - smartlogix-network

  backend-net:
    build:
      context: ./backend-net
      dockerfile: Dockerfile
    container_name: backend-net
    restart: always
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db-mssql;Database=${MSSQL_DB:-SmartLogixDB};User Id=sa;Password=${MSSQL_SA_PASSWORD:-SmartLogix@SecurePassword2026};TrustServerCertificate=True;
    depends_on:
      db-mssql:
        condition: service_healthy
    networks:
      - smartlogix-network

  ai-engine-python:
    build:
      context: ./ai-engine-python
      dockerfile: Dockerfile
    container_name: ai-engine-python
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./docs:/docs
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - DATA_DIR=/docs/data
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    networks:
      - smartlogix-network

volumes:
  mssql-data:
    driver: local

networks:
  smartlogix-network:
    driver: bridge
